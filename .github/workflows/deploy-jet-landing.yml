name: Deploy Jet Landing to GitHub Pages

on:
  push:
    branches: [claude/luxury-jet-landing-page-18ut28, master]
    paths:
      - 'jet-landing/**'
      - '.github/workflows/deploy-jet-landing.yml'
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jet-landing/package.json

      - name: Install dependencies
        run: npm install
        working-directory: jet-landing

      - name: Build
        run: npm run build
        working-directory: jet-landing
        env:
          # base path matches the GitHub Pages URL: /<repo>/jet-landing/
          VITE_BASE_URL: /iframePCF/jet-landing/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jet-landing/dist
          destination_dir: jet-landing
          commit_message: 'deploy: jet-landing page'

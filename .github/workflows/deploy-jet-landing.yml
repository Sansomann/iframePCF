name: Deploy Jet Landing to GitHub Pages

on:
  push:
    branches: [master, claude/luxury-jet-landing-page-18ut28]
    paths:
      - 'jet-landing/**'
      - '.github/workflows/deploy-jet-landing.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jet-landing/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: jet-landing

      - name: Build
        run: npm run build
        working-directory: jet-landing
        env:
          VITE_BASE_URL: /iframePCF/jet-landing/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jet-landing/dist
          destination_dir: jet-landing

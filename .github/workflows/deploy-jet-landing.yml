name: Deploy Jet Landing to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'jet-landing/**'
      - '.github/workflows/deploy-jet-landing.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: jet-landing

      - name: Build
        run: npm run build
        working-directory: jet-landing
        env:
          VITE_BASE_URL: /iframePCF/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jet-landing/dist
          commit_message: 'deploy: jet-landing'

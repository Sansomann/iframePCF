name: Deploy Golf Tracker to GitHub Pages

on:
  push:
    branches: [claude/golf-ball-tracker-app-zkkvwt]
    paths:
      - 'golf-tracker/**'
      - '.github/workflows/deploy-golf-tracker.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: golf-tracker

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
